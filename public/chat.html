<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MlemmyAI</title>

    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/chat.css">

    <script type="module" src="./scripts/customElements.js"></script>
    <script type="module" src="./scripts/chat.js"></script>
</head>

<body>
    <header>
        <button><img src="./icons/back.png" alt="Back"></button>
        <div>
            <h1>Chat Title</h1>
            <img class="chat-image"
                src="https://pub-565faf2130f64e41963a6ebebd514d02.r2.dev/images/blind_bot_785635f1-c993-49df-98a5-c97fe91d8c30"
                alt="Chat Img">
        </div>
    </header>

    <main>
        <section class="message-container">

            <!-- message -->
            <article class="message">
                <img src="https://pub-565faf2130f64e41963a6ebebd514d02.r2.dev/images/blind_bot_785635f1-c993-49df-98a5-c97fe91d8c30"
                    alt="Profile Picture">
                <section>
                    <!-- top bar -->
                    <span>
                        <p>Username</p>
                        <span class="buttons">
                            <button><img src="./icons/edit.png" alt="Edit"></button>
                            <button><img src="./icons/regenerate.png" alt="Regenerate"></button>
                            <button><img src="./icons/delete.png" alt="Delete"></button>
                        </span>
                    </span>
                    <!-- message content -->
                    <article>
                        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ratione a nisi odio quibusdam
                            recusandae delectus commodi voluptates omnis, quisquam consequuntur.</p>
                    </article>
                </section>
            </article>

        </section>
    </main>
</body>

</html>
