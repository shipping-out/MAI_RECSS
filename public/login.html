<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MlemmyAI</title>

    <link href='https://fonts.googleapis.com/css?family=Inter' rel='stylesheet'>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/login.css">

    <script type="module" src="./scripts/customElements.js"></script>
    <script type="module" src="./scripts/login.js"></script>
</head>

<body>
    <m-ai-header empty></m-ai-header>

    <main>
        <h1>Login</h1>
        <form id="loginForm">
            <fieldset>
                <input required id="usernameField" type="text" name="username" id="username" placeholder="Username">
                <input required id="passwordField" type="password" name="password" id="password" placeholder="Password">

                <input type="submit" value="Submit">
            </fieldset>
        </form>

        <p id="signupMessage">Don't have an account? | <a href="/register">Signup</a></p>
    </main>

    <m-ai-footer></m-ai-footer>
</body>

</html>
